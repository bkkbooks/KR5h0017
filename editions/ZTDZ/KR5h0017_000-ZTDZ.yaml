front:
  text: 太上洞玄靈寳五顯靈觀華光本行妙經隷八爾時元始天尊於赤明刼初在大羅天上玉清聖境清徴天中九光元陽之殿與太上玉晨道君太上玄元老君諸天上帝坐九色龍鳳寳座垂十絶靈旛羽盖玉童玉女散諸天香寳花遍滿十方是時九鳳齊唱八鸞同鳴天樂自響靈鳳聚煙獅子白鶴嘯歌雝雝天無氛穢山嶽藏雲元始天尊現神通妙力垂九色祥光天宫玄都莫不焕然下燭十方無極世界俱同一相琉璃清瑩洞徹無碍表裏分明十方無極飛天神王至尊大神一時同會于時東方九炁青帝天君侍眞靈官無鞅數衆浮空而至南方三炁赤帝天君侍眞靈官無鞅數衆浮空而至西方七炁白帝天君侍眞靈官無鞅數衆浮空而至北方五炁黑帝天君侍眞靈官無鞅數衆浮空而至中央一炁黃帝天君侍眞靈官無鞅數衆浮空而至雲集法會稽首恭敬咸聽元始天尊說無上玄元眞一妙法諸天神仙步虛旋繞三界侍軒同聲讚詠當此之時喜慶難言幽關重開並受光明苦爽幽䰟一時解脫時會中有長生度世眞人萬福好生眞人慈悲普濟眞人越班整佩執簡而出稽首上白天尊言天尊大慈天尊大聖肇開天地運度陰陽爲萬靈師爲群生父臣等宿縁流慶得侍至眞忝居眞列今者得預大會拱聽法音宣演重玄俱蒙開化恩不可量臣等伏覩下方世界魔鬼流行侵害生民三災競起五毒興行水火刀兵凶年饑饉死亡至衆甚可哀傷未審以何因縁遭罹此苦恭惟天尊至仁善貸開度群迷大宏濟度之門廣布慈悲之化天尊曰汝當攝念存誠吾當爲汝演說善惡因縁良久日原夫上元之時人多淳朴與天地同體惟道是修教化衆生使歸正道不爲物觸心廣體胖無有損傷克終壽命中元之人禀謙和美厚之人施慈惠温良之德存恤孤寡拯濟飢貧後己先人務行方便下元之人生處世間造惡不悛不修善行道德久廢仁義不行不敬天地不禮三光不畏神明不孝父母不忠君主不念師尊信從邪見不省本源損物害人欺心罔道貪婪無厭積惡招愆恣縱六情莫知已極善惡童子四直功曹紏察使者録其罪目日夜上奏天庭由是三官鼓筆五帝考書削字青編注名黑簿遂使司命司録司功司殺减筭除年或在世非橫連綿運意乖錯所謀不遂轗軻競生疫癘流行致多夭喪或命過之後淪没九幽地獄之中無有善念得脫幽關凡此罪因皆由心造諸眞人聞是語已不勝哀憫再拜上白天尊言臣等欲仗慈悲威光之力分身下降人間救度衆生俾令男女處世安穩去離邪橫富貴長壽灾害不生魔鬼潜消道化日顯君明臣良國祚延永干戈屏息天下太平時和歳豐萬民樂業伏望至尊俯從志願天尊曰汝今欲令利益末世衆生方便啓問發如是願善哉善哉且萬物吾生萬靈無化救度衆生固當如是然不勞汝眞烈汝當靜念在心吾即爲汝演說利益衆生救度之門天尊曰三天境内有靈官大聖華光五大天帥發弘誓願救度衆生攝伏群魔闡揚道化威靈烜赫功德巍巍與道合眞度人無量隨聲赴感捍厄扶衰無願不從延生賜福或現一身或顯五相或化爲諸天天帝或化爲梵王帝身或化爲吉祥如來或化爲日露天主或化爲華光菩薩或化爲天丁力士或化爲妙行眞人以此種種神通隨機攝化救度衆生眞人復問此靈觀大聖以何因縁位居天帥現十方種種神通妙相天尊曰此靈觀五大天帥稟五星五炁之精毓五方五靈之秀化身三界應現十方掌三界禍福之權持萬物生殺之柄吉凶悔吝悉屬陶鎔若或有人一稱其名號曰靈觀大聖華光廣化天君當知神通立現克副願心如影隨形似聲應響昭然感格莫可稱量眞人復問曰仰惟天尊好之德澤被三途恩霑萬彙廣福天人作度人之津梁啓歸眞之徑路伏願特垂勑㫖遣降人間福國安民宣揚玄化天尊於是以金簡玉符遣金童玉女勑召靈觀五大天帥倏忽之間靈五大天帥恭臨法會長跪道前上言臣等仰沐生成忝居眞列今日大慶特蒙勑召得詣瓊軒仰覩天顏聽宣妙法天尊曰世間男女不崇正化造惡不悛以矯詐爲本心以貪婪爲己行放縱情慾背正向邪積種種罪源莫知懺悔致使地祇効奏天律譴誅召惡招殃冤讎纏結報對昭然毫分不失又復有陣亡鬼兵下道妖邪伺人間隙把人年命追魄魂攝人精氣與其邪黨侵害良民或命未盡而遽亡或有全家而疾疫俯觀此輩良可憫憐汝宜下降人間分身化氛應現十方收攝群魔使歸正道俾下元之人離諸患難見存眷屬悉獲安寧已徃先親咸皆超度爾時天尊即說靈觀咒曰
