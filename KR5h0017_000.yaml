front:
  text: 太上洞玄靈寶五顯靈觀華光本行妙經隸八爾時元始天尊於赤明劫初在大羅天上玉清聖境清徴天中九光元陽之殿與太上玉晨道君太上玄元老君諸天上帝坐九色龍鳳寶座垂十絶靈幡羽蓋玉童玉女散諸天香寶花遍滿十方是時九鳳齊唱八鸞同鳴天樂自響靈鳳聚煙獅子白鶴嘯歌雍雍天無氛穢山嶽藏雲元始天尊現神通妙力垂九色祥光天宫玄都莫不焕然下燭十方無極世界俱同一相琉璃清瑩洞徹無礙表裏分明十方無極飛天神王至尊大神一時同會于時東方九氣青帝天君侍真靈官無鞅數衆浮空而至南方三氣赤帝天君侍真靈官無鞅數衆浮空而至西方七氣白帝天君侍真靈官無鞅數衆浮空而至北方五氣黑帝天君侍真靈官無鞅數衆浮空而至中央一氣黃帝天君侍真靈官無鞅數衆浮空而至雲集法會稽首恭敬咸聽元始天尊説無上玄元真一妙法諸天神仙步虛旋繞三界侍軒同聲讚詠當此之時喜慶難言幽關重開並受光明苦爽幽魂一時解脫時會中有長生度世真人萬福好生真人慈悲普濟真人越班整佩執簡而出稽首上白天尊言天尊大慈天尊大聖肇開天地運度陰陽為萬靈師為群生父臣等宿緣流慶得侍至真忝居真列今者得預大會拱聽法音宣演重玄俱蒙開化恩不可量臣等伏覩下方世界魔鬼流行侵害生民三災競起五毒興行水火刀兵凶年飢饉死亡至衆甚可哀傷未審以何因緣遭罹此苦恭惟天尊至仁善貸開度群迷大宏濟度之門廣布慈悲之化天尊曰汝當攝念存誠吾當為汝演説善惡因緣良久日原夫上元之時人多淳朴與天地同體惟道是修教化衆生使歸正道不為物觸心廣體胖無有損傷克終壽命中元之人稟謙和美厚之人施慈惠溫良之德存恤孤寡拯濟飢貧後己先人務行方便下元之人生處世間造惡不悛不修善行道德久廢仁義不行不敬天地不禮三光不畏神明不孝父母不忠君主不念師尊信從邪見不省本源損物害人欺心罔道貪婪無厭積惡招愆恣縱六情莫知已極善惡童子四直功曹紏察使者録其罪目日夜上奏天庭由是三官鼓筆五帝考書削字青編注名黑簿遂使司命司録司功司殺減算除年或在世非橫連綿運意乖錯所謀不遂轗軻競生疫癘流行致多夭喪或命過之後淪沒九幽地獄之中無有善念得脫幽關凡此罪因皆由心造諸真人聞是語已不勝哀憫再拜上白天尊言臣等欲仗慈悲威光之力分身下降人間救度衆生俾令男女處世安穩去離邪橫富貴長壽災害不生魔鬼潛消道化日顯君明臣良國祚延永干戈屏息天下太平時和歲豐萬民樂業伏望至尊俯從志願天尊曰汝今欲令利益末世衆生方便啓問發如是願善哉善哉且萬物吾生萬靈無化救度衆生固當如是然不勞汝真烈汝當靜念在心吾即為汝演説利益衆生救度之門天尊曰三天境內有靈官大聖華光五大天帥發弘誓願救度衆生攝伏群魔闡揚道化威靈烜赫功德巍巍與道合真度人無量隨聲赴感捍厄扶衰無願不從延生賜福或現一身或顯五相或化為諸天天帝或化為梵王帝身或化為吉祥如來或化為日露天主或化為華光菩薩或化為天丁力士或化為妙行真人以此種種神通隨機攝化救度衆生真人復問此靈觀大聖以何因緣位居天帥現十方種種神通妙相天尊曰此靈觀五大天帥稟五星五氣之精育五方五靈之秀化身三界應現十方掌三界禍福之權持萬物生殺之柄吉凶悔吝悉屬陶鎔若或有人一稱其名號曰靈觀大聖華光廣化天君當知神通立現克副願心如影隨形似聲應響昭然感格莫可稱量真人復問曰仰惟天尊好之德澤被三途恩霑萬彙廣福天人作度人之津梁啓歸真之徑路伏願特垂勑旨遣降人間福國安民宣揚玄化天尊於是以金簡玉符遣金童玉女勑召靈觀五大天帥倏忽之間靈五大天帥恭臨法會長跪道前上言臣等仰沐生成忝居真列今日大慶特蒙勑召得詣瓊軒仰覩天顏聽宣妙法天尊曰世間男女不崇正化造惡不悛以矯詐為本心以貪婪為己行放縱情欲背正向邪積種種罪源莫知懺悔致使地祇效奏天律譴誅召惡招殃冤讎纏結報對昭然毫分不失又復有陳亡鬼兵下道妖邪伺人間隙把人年命追魄魂攝人精氣與其邪黨侵害良民或命未盡而遽亡或有全家而疾疫俯觀此輩良可憫憐汝宜下降人間分身化氛應現十方收攝群魔使歸正道俾下元之人離諸患難見存眷屬悉獲安寧已往先親咸皆超度爾時天尊即説靈觀咒曰
