body:
  text: 玄元始祖三氣氤氲開明三景頂立乾坤保制劫運使天長存三天主帝上帝高真修真闡教利物濟人燮調元化福國安民靈官大聖華光之君神通無極上佐帝宸分身化氣三界遊巡濟生度死福善禍淫禳災度厄辟毒驅溫廣宣號令役使雷神手持金鎗足踏火輪火瓢火鴉飛焰星奔金磚萬疊雷火磷磷天目一視三界齊欽順風千里善惡皆聞六丁六甲三五將軍雷公電母擲火流金風伯雨師播雨興雲天丁力士隊仗紛紜封山破洞馘滅鬼群魔精畏伏潛迹海濱敢有拒送攝魄收魂金鎚裂腦鐵戟穿心钁天大斧斬截其身烏風一掃化作徴塵九州社令血食之賓城隍主者聽吾指陳佐助玄教積纍殊勳元始玉字八威龍文普告三界萬靈咸遵急急如彾天尊復謂真人曰世間男女或有妖邪魍魎山魈木客古器伏尸土怪石精水脈旺魅不正等神變易形質拋磚放火攝人魂𩲸占人宅舍百種形狀惱亂衆生凡有是諸患難善信男女速宜齋戒沐浴或於古觀靈壇或於本居淨室建立三清寶座五帝靈壇然香點燈獻花酌水投詞露懇拜表上章皈命三界高真靈官大聖持念真經誦詠神咒首愆謝過請福延生靈觀大聖應時感格部領五百靈觀大聖金磚金鎗火瓢火車火鴉大將無面目大將軍白蛇大將軍順風千里使者五方雷神天將銅頭鐵面六天吏兵火部率衆流金擲火掣電轟雷一合下降掃蕩妖氛驅逐不祥肅清境界人鬼分離生民安泰靈觀元帥威神之吏莫可稱量凡有見聞各宜恭敬若復世間亢陽為沴積陰為癘祝融扇禍江海失經或干戈互起人民流亡蟲蝗為妖蠹食禾穢如是災難皆當依儀醮謝天地轉念真經皈命上玄祈恩請福即得國土清平風調雨順百物清潤河清海晏又若世人星辰衝戰祿馬休囚疾病纒綿求安無路或修墳立宅干犯土皇或官司牢獄冤枉不伸或疫癘流行人民困弊或江河轉運波浪驚危或曠野山林惡獸奔突或夫妻刑隔嗣續未蕃或水陸經營惡人值遇或咒詛相仍侵凌眷屬或身懷六甲母子未分或在世孤貧謀為阻晦或門户閉塞畜養不生或買遷經术財物散耗或冢訟微呼先亡復連如是等種種災難皆緣世人積惡深厚以致禍患來鐘福瑞希降若能依儀行道罄志投誠剖露腹心皈依懺悔即獲平安神眀護門道氣滋扶一切災難應時消散又若世間男女為先祖宗親父母亡沒起心薦拔冀徹孝思即得魂出幽關逍遙快樂永辭沉結上生天堂是經功德不可思議存亡獲福善利無邊於是真人得聞語已誓願流傳纘嘆靈觀大聖而獻頌曰高上太微中有玄虛五形全妙萬法希民化身三界變現十方道合自然國泰民康説是頌已法會衆真無鞅仙聖咸皆稱善天尊再告真人曰世間男女能依吾所授奉教而行者皆道心深重宿有善緣尊崇供養萬災不干吉祥如意衆善齊降諸惡不生更能於四時八節三元三會五臘十直甲子庚申月旦本命是諸良辰吉日如法自持自然千真萬合福壽延長七祖九玄均獲超度更能傳授世人敬信讀誦福利無邊是經功德果報照然不可思議天尊説是經已靈觀大聖敬奉教旨下降人間廣宣玄化十方天真大聖無鞅仙衆稱揚讚嘆歡喜踴躍稽首禮謝無上虛皇正真三寶作禮而退謹奉道旨敬為流傳太上洞玄靈寶五顯靈觀華光本行妙經終
